{% extends "base.html" %}
{% load static %}

{% block title %}Post a Job — WorkBee{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Post a New Job</h1>
    <p>Fill in the details below to create a job listing</p>
</div>

<div class="form-card animate-in" style="max-width: 640px;">
    <form method="post" action="{% url 'job_create' %}">
        {% csrf_token %}

        <div class="form-group">
            <label for="title">Job Title</label>
            <input type="text" id="title" name="title" placeholder="e.g. Software Developer" required>
        </div>

        <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" name="location" placeholder="e.g. Mumbai, Remote">
        </div>

        <div class="form-group">
            <label for="description">Job Description</label>
            <textarea id="description" name="description" placeholder="Describe the role, responsibilities, and requirements..." required></textarea>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn btn-primary">Post Job</button>
            <a href="{% url 'my_jobs' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
