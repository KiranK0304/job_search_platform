{% extends "base.html" %}
{% load static %}

{% block title %}Post a Job — WorkBee{% endblock %}

{% block content %}
<div class="dark-page dark-page--inner flex-center" style="min-height: 80vh;">
    <div class="dk-card" style="max-width: 640px; width: 100%; padding: 48px; margin: 0 auto;">
        <div class="dk-page-header" style="justify-content: center; text-align: center; margin-bottom: 32px;">
            <div>
                <div style="font-size: 3rem; margin-bottom: 16px;">✏️</div>
                <h1 class="dk-title" style="font-size: 2rem; margin-bottom: 8px;">Post a New Job</h1>
                <p class="dk-subtitle" style="font-size: 1rem; margin: 0;">Fill in the details below to create a job listing</p>
            </div>
        </div>

        <form method="post" action="{% url 'job_create' %}" style="display: flex; flex-direction: column; gap: 24px;">
            {% csrf_token %}

            <div style="display: flex; flex-direction: column; gap: 8px;">
                <label for="title" style="color: rgba(255, 255, 255, 0.8); font-size: 0.95rem; font-weight: 600;">Job Title</label>
                <input type="text" id="title" name="title" class="dk-search-input" style="width: 100%; border-radius: 10px;" placeholder="e.g. Software Developer" required>
            </div>

            <div style="display: flex; flex-direction: column; gap: 8px;">
                <label for="location" style="color: rgba(255, 255, 255, 0.8); font-size: 0.95rem; font-weight: 600;">Location</label>
                <input type="text" id="location" name="location" class="dk-search-input" style="width: 100%; border-radius: 10px;" placeholder="e.g. Mumbai, Remote">
            </div>

            <div style="display: flex; flex-direction: column; gap: 8px;">
                <label for="description" style="color: rgba(255, 255, 255, 0.8); font-size: 0.95rem; font-weight: 600;">Job Description</label>
                <textarea id="description" name="description" class="dk-search-input" style="width: 100%; border-radius: 10px; min-height: 180px; font-family: inherit; resize: vertical;" placeholder="Describe the role, responsibilities, and requirements..." required></textarea>
            </div>

            <div style="display: flex; gap: 16px; margin-top: 16px;">
                <button type="submit" class="dk-btn-sm" style="flex: 1; justify-content: center; padding: 14px; font-size: 1.05rem; background: linear-gradient(135deg, #10b981, #059669);">Post Job</button>
                <a href="{% url 'my_jobs' %}" class="dk-btn-ghost" style="flex: 1; justify-content: center; padding: 14px; font-size: 1.05rem; background: rgba(255,255,255,0.05);">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
