{% extends "base.html" %}
{% load static %}

{% block title %}Apply — {{ job.title }} — WorkBee{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Apply to: {{ job.title }}</h1>
    <p>📍 {{ job.location|default:"Remote" }} · 👤 Posted by {{ job.created_by.username }}</p>
</div>

<!-- Application form -->
<div class="form-card animate-in" style="max-width: 640px;">
    <form method="post" action="{% url 'apply_to_job' job.id %}">
        {% csrf_token %}

        <div class="form-group">
            <label for="cover_letter">Cover Letter (optional)</label>
            <textarea id="cover_letter" name="cover_letter" placeholder="Tell the employer why you're a great fit for this role..."></textarea>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn btn-primary">Submit Application</button>
            <a href="{% url 'job_detail' job.id %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
