{% extends "base.html" %}
{% load static %}

{% block title %}Login — WorkBee{% endblock %}

{% block content %}
<div class="dark-page dark-page--inner login-shell">
    <div class="dk-card auth-card">
        <div class="auth-head">
            <p class="auth-kicker">Secure Access</p>
            <div class="auth-icon">🔑</div>
            <h1 class="dk-title auth-title">Welcome Back</h1>
            <p class="dk-subtitle auth-subtitle">Log in to your account</p>
        </div>

        {% if error %}
            <div class="auth-error">
                ⚠️ {{ error }}
            </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}" class="auth-form">
            {% csrf_token %}

            <div class="auth-field">
                <label for="username" class="auth-label">Username</label>
                <div class="auth-input-wrap">
                    <span class="auth-input-icon">@</span>
                    <input type="text" id="username" name="username" class="dk-search-input auth-input" placeholder="Enter your username" value="{{ form_data.username|default:'' }}" required>
                </div>
            </div>

            <div class="auth-field">
                <label for="password" class="auth-label">Password</label>
                <div class="auth-input-wrap">
                    <span class="auth-input-icon">*</span>
                    <input type="password" id="password" name="password" class="dk-search-input auth-input" placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="dk-btn-sm auth-submit">Sign In</button>
        </form>

        <div class="auth-foot">
            <p>
                Don't have an account? <a href="{% url 'register' %}">Create one</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
