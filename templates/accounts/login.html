{% extends "base.html" %}
{% load static %}

{% block title %}Login — WorkBee{% endblock %}

{% block content %}
<div class="dark-page dark-page--inner flex-center" style="min-height: 80vh;">
    <div class="dk-card" style="max-width: 440px; width: 100%; padding: 48px;">
        <div style="text-align: center; margin-bottom: 32px;">
            <div style="font-size: 3rem; margin-bottom: 16px;">🔑</div>
            <h1 class="dk-title" style="font-size: 2rem; margin-bottom: 8px;">Welcome Back</h1>
            <p class="dk-subtitle" style="font-size: 1rem; margin: 0;">Log in to your account</p>
        </div>

        {% if error %}
            <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #fca5a5; padding: 12px 16px; border-radius: 8px; margin-bottom: 24px; text-align: center; font-size: 0.95rem;">
                ⚠️ {{ error }}
            </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}" style="display: flex; flex-direction: column; gap: 20px;">
            {% csrf_token %}

            <div style="display: flex; flex-direction: column; gap: 8px;">
                <label for="username" style="color: rgba(255, 255, 255, 0.8); font-size: 0.9rem; font-weight: 600;">Username</label>
                <input type="text" id="username" name="username" class="dk-search-input" style="width: 100%; border-radius: 10px;" placeholder="Enter your username" required>
            </div>

            <div style="display: flex; flex-direction: column; gap: 8px;">
                <div style="display: flex; justify-content: space-between;">
                    <label for="password" style="color: rgba(255, 255, 255, 0.8); font-size: 0.9rem; font-weight: 600;">Password</label>
                </div>
                <input type="password" id="password" name="password" class="dk-search-input" style="width: 100%; border-radius: 10px;" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="dk-btn-sm" style="width: 100%; justify-content: center; padding: 14px; margin-top: 8px; font-size: 1.05rem;">Sign In</button>
        </form>

        <div style="margin-top: 32px; text-align: center;">
            <p style="color: rgba(255, 255, 255, 0.6); font-size: 0.95rem; margin: 0;">
                Don't have an account? <a href="{% url 'register' %}" style="color: #a78bfa; text-decoration: none; font-weight: 600;">Create one</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
